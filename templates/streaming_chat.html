<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Expense Assistant - Streaming</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .chat-header {
            background: #4a5568;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }
        
        .user-bubble {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 18px;
        }
        
        .ai-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 18px;
            border: 1px solid #dee2e6;
        }
        
        .typing-indicator {
            display: none;
            color: #6c757d;
            font-style: italic;
            margin-left: 10px;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #007bff;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        #send-button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        #send-button:hover {
            background: #0056b3;
        }
        
        #send-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .tool-call {
            background: #fff3cd;
            color: #856404;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 5px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            💬 AI Expense Assistant - Streaming
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be added here dynamically -->
        </div>
        
        <div class="chat-input">
            <div class="input-group">
                <input type="text" id="message-input" placeholder="Ask about your expenses..." autocomplete="off">
                <button id="send-button" onclick="sendMessage()">Send</button>
            </div>
            <div class="typing-indicator" id="typing-indicator">AI is thinking...</div>
        </div>
    </div>

    <script>
        let isStreaming = false;
        
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isStreaming) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            isStreaming = true;
            showTypingIndicator();
            
            try {
                const response = await fetch('/ai-agent-stream/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ message: message })
                });

                // Check if response is ok
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let aiBubbleId = null;
                let receivedData = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        if (!receivedData) {
                            addMessage('❌ No response received from server', 'ai');
                        }
                        break;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                receivedData = true;
                                const jsonStr = line.substring(6).trim();
                                if (!jsonStr) continue;
                                
                                const data = JSON.parse(jsonStr);
                                console.log('Received:', data);
                                
                                // Handle text responses
                                if (data.type === 'text' && data.content) {
                                    assistantMessage += data.content;
                                    // Create AI message bubble on first text
                                    if (!aiBubbleId) {
                                        aiBubbleId = addMessage('', 'ai');
                                    }
                                    updateMessage(aiBubbleId, assistantMessage);
                                    hideTypingIndicator();
                                }
                                
                                // Handle status updates
                                else if (data.type === 'thinking' && data.content) {
                                    const statusDiv = document.getElementById('typing-indicator');
                                    if (statusDiv) {
                                        statusDiv.textContent = data.content;
                                    }
                                }
                                
                                // Handle tool execution results
                                else if (data.type === 'tool_result' && data.content) {
                                    if (!aiBubbleId) {
                                        aiBubbleId = addMessage(`✅ ${data.content}`, 'ai');
                                    } else {
                                        addMessage(`✅ ${data.content}`, 'ai');
                                    }
                                    hideTypingIndicator();
                                }
                                
                                // Handle completion
                                else if (data.type === 'complete') {
                                    hideTypingIndicator();
                                }
                                
                                // Handle errors
                                else if (data.type === 'error') {
                                    addMessage(`⚠️ Error: ${data.error}`, 'ai');
                                    hideTypingIndicator();
                                }
                            } catch (e) {
                                console.error('Parse error on line:', line, e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Streaming error:', error);
                addMessage(`❌ Error: ${error.message}`, 'ai');
            } finally {
                isStreaming = false;
                hideTypingIndicator();
            }
        }

        function addMessage(content, sender) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${sender}-bubble`;
            bubble.id = sender === 'ai' ? `ai-${Date.now()}` : '';
            bubble.textContent = content;
            
            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return bubble.id;
        }

        function updateMessage(bubbleId, content) {
            const bubble = document.getElementById(bubbleId);
            if (bubble) {
                bubble.textContent = content;
            }
        }

        function showToolCall(toolCalls) {
            if (!toolCalls || toolCalls.length === 0) return;
            
            const toolCall = toolCalls[0];
            const toolName = toolCall.function?.name || 'unknown';
            const toolArgs = toolCall.function?.arguments ? JSON.parse(toolCall.function.arguments) : {};
            
            let toolDescription = '';
            if (toolName === 'add_expense') {
                toolDescription = `💰 Adding expense: $${toolArgs.amount} for ${toolArgs.category}`;
            } else if (toolName === 'get_spending_stats') {
                toolDescription = `📊 Getting spending statistics${toolArgs.period ? ' for ' + toolArgs.period : ''}`;
            } else if (toolName === 'query_expenses') {
                toolDescription = `🔍 Querying expenses${toolArgs.category ? ' in ' + toolArgs.category : ''}`;
            } else if (toolName === 'delete_expense') {
                toolDescription = `🗑️ Deleting expense`;
            } else if (toolName === 'update_expense') {
                toolDescription = `✏️ Updating expense`;
            }
            
            if (toolDescription) {
                const toolDiv = document.createElement('div');
                toolDiv.className = 'tool-call';
                toolDiv.textContent = toolDescription;
                
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.appendChild(toolDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        function showTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'block';
        }

        function hideTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'none';
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // Enter key to send message
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
